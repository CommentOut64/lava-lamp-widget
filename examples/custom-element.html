<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lava Lamp Custom Element Example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #274060 0%, #16213a 40%, #0b1220 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: white;
      }

      .layout-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 120px;
        width: 100%;
        max-width: 1200px;
        padding: 0 40px;
      }

      .intro-text {
        max-width: 450px;
      }

      .intro-text h1 {
        font-size: 3rem;
        margin-bottom: 30px;
        background: linear-gradient(90deg, #ff7a18, #f4a261);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .intro-text p {
        font-size: 1.25rem;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 16px;
        position: relative;
        padding-left: 28px;
      }

      .intro-text p::before {
        content: '✨';
        position: absolute;
        left: 0;
        top: 2px;
        font-size: 1.1rem;
      }

      lava-lamp-widget {
        transform: scale(1.2); /* 放大 */
        display: block;
        width: 160px;
        height: 520px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="layout-container">
      <div class="intro-text">
        <h1>Lava Lamp Widget</h1>
        <p>一个基于 WebGL 和流体物理引擎的高性能熔岩灯组件</p>
        <p>高度可定制（大小、颜色、粒子状态）</p>
        <p>框架无关，可直接嵌入网页</p>
      </div>
      <lava-lamp-widget
        data-test-id="lava-custom"
        width="160"
        height="520"
        background-color="#101820"
      ></lava-lamp-widget>
    </div>
    <script src="../dist/lava-lamp-widget.js"></script>
    <script>
      LavaLampWidget.defineCustomElement();

      // 获取 Web Component 以及它内部挂载的实例
      const widget = document.querySelector('lava-lamp-widget');
      const instance = widget.instance;

      // 开启自定义调色板模式
      instance.setOptions({ backgroundMode: 'custom' });

      let time = 0;
      function cycleColors() {
        time += 0.002; // 大幅调低变色速度，让过渡变得非常缓慢柔和
        
        // 利用正弦波相位差，让红绿蓝在 0~255 之间平滑交替过渡
        const r = Math.floor((Math.sin(time) * 0.5 + 0.5) * 255);
        const g = Math.floor((Math.sin(time + (2 * Math.PI / 3)) * 0.5 + 0.5) * 255);
        const b = Math.floor((Math.sin(time + (4 * Math.PI / 3)) * 0.5 + 0.5) * 255);
        
        // 转换为两位的 16 进制字符串，并确保拼接成 '#RRGGBB' 格式
        const toHex = (c) => c.toString(16).padStart(2, '0');
        const hexColor = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        
        // 注意：底层的渲染器（WebGL）和调色板系统要求颜色格式为 Hex 并且是数组
        instance.setPalette({
          wax: [hexColor],
          liquid: [hexColor] 
        });
        
        requestAnimationFrame(cycleColors);
      }
      
      cycleColors();
    </script>
  </body>
</html>
